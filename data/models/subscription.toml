# A subscription is an active contract that grants permission to use the resources at a cloud provider. It acts as the bridge between an identity and a provider's billing system.
origin_resource = "platform"

[[create_resource]]
resource_type = "subscription"
relation_type = "BASELINE_TEMPLATE"
name = "{{- tenant | lower -}}_{{- solution | lower -}}_{{- stage | lower -}}"
[create_resource.properties]
tenant = "{{- tenant | lower -}}"
description = "This subscription defines the cloud environment for the resident rescile and captures the dependencies for the solution deployment."
stage = "{{- stage | lower -}}"
#cost_center = "{{- solutions[solution].cost_center -}}"
created = "{{- now(utc=true) | date(format='%Y-%m-%dT%H:%M:%SZ') -}}"
