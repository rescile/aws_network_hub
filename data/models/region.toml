# This model represents a third tier model of a cloud domain and defines locations where provider resources can be consumed.
origin_resource = "platform"

aws_region_services = { "json!" = "aws_region_service.json" }
aws_region_endpoint = { "json!" = "aws_region_endpoint.json" }
aws_endpoints = { "function!" = '''
    {% set unique_services = [] %}
    {% set loc = origin_resource.region %}
    {% for e in aws_region_endpoint.prefixes %}
        {% if e.region == loc %}
            {# Check if the service is already in the list #}
            {% if e.service in unique_services %}
                {# Do nothing #}
            {% else %}
                {# Wrap e.service in [] to make it a list for concat #}
                {% set_global unique_services = unique_services | concat(with=[e.service]) %}
            {% endif %}
        {% endif %}
    {% endfor %}
    {{ unique_services | json_encode() }}
''' }

# Create the resource type
[[create_resource]]
create_from = { property = "region" }
name = "{{- origin_resource.name | lower -}}_{{- origin_resource.location | lower -}}_region"
relation_type = "MANAGED_BY"
[create_resource.properties]
function = "{{- origin_resource.location | lower -}}"
service = "{{ aws_region_services[origin_resource.region].service }}"
endpoint = "{{ aws_endpoints }}"
description = "The region describes a {{ origin_resource.name }} managed, physical, geographical location of where infrastructure resides, data is stored, and applications run."
created = "{{- now(utc=true) | date(format='%Y-%m-%dT%H:%M:%SZ') -}}"
