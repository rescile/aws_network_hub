origin_resource = "provider"

[[link_resources]]
with = "login"
match_with = [ { property = "name", value = "provider_management" } ]
create_relation = { type = "RESPONSIBLE_FOR" }

[[link_resources]]
with = "login"
match_with = [ { property = "name", value = "cloud_administration" } ]
create_relation = { type = "MANAGED_BY" }
